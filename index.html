<!doctype html>
<html lang="fr">
<head>
		<!-- inside -->
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Flappy Bird</title>
		<meta
			name="description"
			content="Petit jeu Flappy Bird écrit en HTML/CSS/JS — joue avec Espace / Clic / Touch"
		/>
		<link rel="canonical" href="https://flappy-bird.alexis-larose.com/" />

		<!-- Open Graph -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://flappy-bird.alexis-larose.com/" />
		<meta property="og:title" content="Flappy Bird" />
		<meta
			property="og:description"
			content="Petit jeu Flappy Bird écrit en HTML/CSS/JS — joue avec Espace / Clic / Touch"
		/>
		<meta property="og:image" content="https://flappy-bird.alexis-larose.com/favicon/logo.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:site" content="@SpiderManMaGeul" />
		<meta name="twitter:creator" content="@SpiderManMaGeul" />
		<meta name="twitter:title" content="Flappy Bird" />
		<meta
			name="twitter:description"
			content="Petit jeu Flappy Bird écrit en HTML/CSS/JS — joue avec Espace / Clic / Touch"
		/>
		<meta name="twitter:image" content="https://flappy-bird.alexis-larose.com/favicon/logo.png" />

		<!-- json-ld -->
		<script type="application/ld+json">
			{
				"@context": "https://schema.org",
				"@type": "WebSite",
				"url": "https://flappy-bird.alexis-larose.com/",
				"name": "Flappy Bird",
				"description": "Petit jeu Flappy Bird écrit en HTML/CSS/JS — joue avec Espace / Clic / Touch",
				"publisher": {
					"@type": "Organization",
					"name": "Alexis Larose",
					"logo": { "@type": "ImageObject", "url": "https://flappy-bird.alexis-larose.com/favicon/logo.png" }
				}
			}
		</script>

		<!-- favicon -->
  <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
  <link rel="shortcut icon" href="/favicon/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Flappy Bird" />
  <link rel="manifest" href="/favicon/site.webmanifest" />

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="game-wrapper">
    <canvas id="game" width="540" height="760" aria-label="Flappy Bird canvas"></canvas>

    <!-- Start / Pause overlay -->
    <div class="overlay" id="startOverlay">
      <h1>Flappy Bird</h1>
      <p class="hint">Appuie sur <strong>ESPACE</strong>, clique ou touche pour voler</p>
      <div class="controls-row">
        <button id="startBtn">Démarrer</button>
      </div>
      <p id="best" class="best">Meilleur : <span id="bestScore">0</span></p>
    </div>

    <!-- loading overlay -->
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p>Chargement des assets…</p>
    </div>

    <!-- settings panel -->
    <div class="panel hidden" id="settingsPanel">
      <h3>Paramètres</h3>
      <label>Volume <input id="volume" type="range" min="0" max="1" step="0.01"></label>
      <label>Difficulté <input id="difficultyRange" type="range" min="0.5" max="2.5" step="0.1"></label>
      <div class="panel-actions"><button id="closeSettings">Fermer</button></div>
    </div>

    <!-- Game over modal -->
    <div class="modal hidden" id="gameOver">
      <div class="modal-card">
        <h2>Game Over</h2>
        <p class="final-score">Score : <span id="finalScore">0</span></p>
        <p class="final-best">Meilleur : <span id="finalBest">0</span></p>
        <div class="modal-actions">
          <button id="restartBtn">Rejouer</button>
        </div>
      </div>
    </div>

    <!-- floating score notification container -->
    <div id="floating"></div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
